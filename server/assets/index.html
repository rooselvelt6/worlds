<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORLDS - Motor 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #0a0e14; --cyan: #22d3ee; --purple: #a855f7; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); margin: 0; overflow: hidden; color: white; }
        .panel { background: rgba(15,19,25,0.95); border: 1px solid #1e293b; backdrop-filter: blur(16px); }
        .btn { background: #1e293b; border: 1px solid #334155; transition: all 0.2s; }
        .btn:hover { background: #0891b2; border-color: #22d3ee; }
        .btn.active { background: #0891b2; border-color: #22d3ee; box-shadow: 0 0 15px #22d3ee; }
        .slider { -webkit-appearance: none; width: 100%; height: 6px; background: linear-gradient(to right, var(--cyan), var(--purple)); border-radius: 3px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--cyan); cursor: pointer; box-shadow: 0 0 10px var(--cyan); }
        #game-canvas { display: block; width: 100vw; height: 100vh; }
        #crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255,255,255,0.8);
        }
        #crosshair::before { width: 20px; height: 2px; left: -10px; top: -1px; }
        #crosshair::after { width: 2px; height: 20px; left: -1px; top: -10px; }
        #minimap {
            position: fixed; bottom: 20px; right: 20px; width: 120px; height: 120px;
            border: 2px solid var(--cyan); border-radius: 8px; z-index: 100;
            background: rgba(0,0,0,0.5); overflow: hidden;
        }
        #minimap canvas { width: 100%; height: 100%; }
        #minimap-marker {
            position: absolute; width: 6px; height: 6px; background: red;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

        <div class="space-y-4 text-sm">
            <div>
                <div class="flex justify-between mb-1"><span class="text-slate-400">Seed</span><span id="seed-val" class="text-cyan-400">42</span></div>
                <input type="range" id="seed-slider" min="1" max="9999" value="42" class="slider">
            </div>
            <div>
                <div class="flex justify-between mb-1"><span class="text-slate-400">Altura</span><span id="amp-val" class="text-cyan-400">18</span></div>
                <input type="range" id="amp-slider" min="5" max="50" value="18" class="slider">
            </div>
            <div>
                <div class="flex justify-between mb-1"><span class="text-slate-400">Agua</span><span id="water-val" class="text-cyan-400">6</span></div>
                <input type="range" id="water-slider" min="0" max="20" value="6" class="slider">
            </div>
            <div>
                <div class="flex justify-between mb-1"><span class="text-slate-400">Frecuencia</span><span id="freq-val" class="text-cyan-400">25</span></div>
                <input type="range" id="freq-slider" min="5" max="100" value="25" class="slider">
            </div>
            <div>
                <div class="flex justify-between mb-1"><span class="text-slate-400">Detalle</span><span id="octaves-val" class="text-cyan-400">5</span></div>
                <input type="range" id="octaves-slider" min="1" max="8" value="5" class="slider">
            </div>
            <div class="mt-4 p-2 rounded bg-slate-800">
                <div class="text-xs text-slate-500 mb-1">Fórmula</div>
                <div id="formula" class="text-xs font-mono text-cyan-400">h = fbm(x*0.025, z*0.025) * 18 + 6</div>
            </div>
        </div>
    </aside>
    
    <div class="fixed bottom-4 left-4 right-4 p-3 rounded-xl panel z-40 flex justify-center gap-4 text-sm">
        <span class="text-slate-400"><kbd class="bg-slate-700 px-2 py-1 rounded">WASD</kbd> Mover</span>
        <span class="text-slate-400"><kbd class="bg-slate-700 px-2 py-1 rounded">Q/E</kbd> Girar</span>
        <span class="text-cyan-400"><kbd class="bg-cyan-700 px-2 py-1 rounded">R</kbd> Regenerar</span>
    </div>

<script>
// === WORLD 3D ENGINE ===
const CHUNK = 24;
let scene, camera, renderer;
let pos = { x: 50, y: 25, z: 50 };
let yaw = 0.785;
let pitch = 0;
let mouseEnabled = false;
let keys = {};
let lastTime = 0;
let frameCount = 0;
let fpsTime = 0;

let params = {
    seed: 42,
    amplitude: 18,
    waterLevel: 6,
    frequency: 0.025,
    octaves: 5,
    renderDistance: 2,
    subworld: 'fractal_forest',
    formula: 'fbm'
};

let subworldColors = {
    fractal_forest: 0x2d5a27,
    simplex_plains: 0x4a7c59,
    voronoi_city: 0x6b7280,
    ridged_mountains: 0x78716c,
    crystal_cavern: 0x8b5cf6,
    mandelbrot_realm: 0xdb2777,
    sierpinski_temple: 0xd97706,
    domain_warp_void: 0x475569,
    billow_ocean: 0x0284c7,
    hybrid_dream: 0xdc2626
};

let subworldFormulas = {
    fractal_forest: 'fbm',
    simplex_plains: 'simplex',
    voronoi_city: 'voronoi',
    ridged_mountains: 'ridgedmf',
    crystal_cavern: 'simplex',
    mandelbrot_realm: 'mandelbrot',
    sierpinski_temple: 'sierpinski',
    domain_warp_void: 'domainwarp',
    billow_ocean: 'billow',
    hybrid_dream: 'hybrid'
};

// BLOCK TEXTURES (procedural colors for each block type)
let blockTextures = {
    grass: { top: 0x4a7c59, side: 0x8B4513, bottom: 0x654321 },
    stone: 0x808080,
    dirt: 0x654321,
    sand: 0xD4A84B,
    water: 0x0284c7,
    snow: 0xffffff,
    forest: { top: 0x2d5a27, side: 0x8B4513 },
    desert: 0xd4a84b,
    tundra: 0xc8e6f0,
    jungle: 0x1b4d1b,
    volcanic: { top: 0x5c4033, side: 0x2d2d2d },
    crystal: { color: 0x8b5cf6, glow: true },
    mandelbrot: 0xdb2777,
    voronoi: 0x4a5568,
    default: 0x4a7c59
};

let subworldMaterials = new Map();

// PROCEDURAL TEXTURE GENERATOR
function createProceduralTexture(type) {
    const size = 64;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const tex = blockTextures[type] || blockTextures.default;
    
    if (typeof tex === 'number') {
        ctx.fillStyle = '#' + tex.toString(16).padStart(6, '0');
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for (let i = 0; i < 20; i++) {
            ctx.fillRect(Math.random() * size, Math.random() * size, 2, 2);
        }
    } else if (tex.top && tex.side) {
        ctx.fillStyle = '#' + tex.side.toString(16).padStart(6, '0');
        ctx.fillRect(0, 0, size, size);
        for (let i = 0; i < 30; i++) {
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(Math.random() * size, Math.random() * size, 3, 3);
        }
    } else {
        ctx.fillStyle = '#' + (tex.color || 0x4a7c59).toString(16).padStart(6, '0');
        ctx.fillRect(0, 0, size, size);
    }
    
    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    return texture;
}

// TEXTURE LOADER
const textureLoader = new THREE.TextureLoader();
const loadedTextures = {};

function loadBlockTextures() {
    Object.keys(blockTextures).forEach(type => {
        loadedTextures[type] = createProceduralTexture(type);
    });
}

function getBlockMaterial(subworld) {
    if (subworldMaterials.has(subworld)) return subworldMaterials.get(subworld);
    
    const color = subworldColors[subworld] || 0x2d5a27;
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.8,
        metalness: 0.1
    });
    
    subworldMaterials.set(subworld, mat);
    return mat;
}

let meshes = new Map();

// FORMULA FUNCTIONS
function hash2d(x, z, seed) {
    let n = Math.sin(x * 127.42 + z * 313.37 + seed) * 43758.5453;
    return { x: (n - Math.floor(n)), y: (n * 1.3 - Math.floor(n * 1.3)) };
}

function noise(x, z, seed) {
    let n = Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453;
    return (n - Math.floor(n)) * 2 - 1;
}

function fbm(x, z, oct, seed) {
    let v = 0, a = 1, f = 1, m = 0;
    for (let i = 0; i < oct; i++) {
        v += noise(x * f, z * f, seed + i * 100) * a;
        m += a; a *= 0.5; f *= 2;
    }
    return m > 0 ? v / m : 0;
}

function simplex(x, z, seed) {
    return fbm(x, z, 4, seed);
}

function voronoi(x, z) {
    let ix = Math.floor(x);
    let iz = Math.floor(z);
    let minDist = Infinity;
    for (let dx = -1; dx <= 1; dx++) {
        for (let dz = -1; dz <= 1; dz++) {
            let cx = ix + dx;
            let cz = iz + dz;
            let h = hash2d(cx, cz, params.seed);
            let cellX = cx + h.x;
            let cellZ = cz + h.y;
            let dist = Math.sqrt((x - cellX) ** 2 + (z - cellZ) ** 2);
            minDist = Math.min(minDist, dist);
        }
    }
    return minDist;
}

function mandelbrot(cx, cy) {
    let x0 = cx * 2.5 - 2.0;
    let y0 = cy * 2.0 - 1.0;
    let x = 0, y = 0, iter = 0;
    let maxIter = 8;
    while (x * x + y * y <= 4 && iter < maxIter) {
        let xtemp = x * x - y * y + x0;
        y = 2 * x * y + y0;
        x = xtemp;
        iter++;
    }
    return iter / maxIter;
}

function sierpinski(x, z) {
    let px = Math.abs(x) | 0;
    let pz = Math.abs(z) | 0;
    let count = 0;
    while ((px | pz) !== 0) {
        if ((px & 1) === 1 && (pz & 1) === 1) count++;
        px >>= 1;
        pz >>= 1;
    }
    return count % 2 === 0 ? 0 : 1;
}

function billow(x, z, seed) {
    return Math.abs(fbm(x, z, 4, seed));
}

function ridgedmf(x, z, seed) {
    let v = 0, a = 1, f = 1, prev = 1, m = 0;
    for (let i = 0; i < 4; i++) {
        let n = 1 - Math.abs(noise(x * f, z * f, seed + i * 100));
        let ridge = n * n;
        v += ridge * a * prev;
        prev = ridge;
        m += a;
        a *= 0.5;
        f *= 2;
    }
    return v / m;
}

function domainWarp(x, z, seed) {
    let warpX = x + fbm(x + 10, z, 3, seed) * 2;
    let warpZ = z + fbm(x, z + 10, 3, seed) * 2;
    return fbm(warpX, warpZ, 4, seed);
}

function hybrid(x, z, seed) {
    let f = fbm(x, z, 4, seed);
    let r = ridgedmf(x * 1.5, z * 1.5, seed);
    let v = voronoi(x * 0.5, z * 0.5);
    return (f + r + v) / 3;
}

function calculate(x, z, formula) {
    switch (formula) {
        case 'fbm': return fbm(x, z, params.octaves, params.seed);
        case 'simplex': return simplex(x, z, params.seed);
        case 'voronoi': return voronoi(x, z);
        case 'ridgedmf': return ridgedmf(x, z, params.seed);
        case 'mandelbrot': return mandelbrot(x * 0.3, z * 0.3);
        case 'sierpinski': return sierpinski(x, z);
        case 'domainwarp': return domainWarp(x, z, params.seed);
        case 'billow': return billow(x, z, params.seed);
        case 'hybrid': return hybrid(x, z, params.seed);
        default: return fbm(x, z, params.octaves, params.seed);
    }
}

function getHeight(x, z) {
    const formula = subworldFormulas[params.subworld] || 'fbm';
    const base = calculate(x * params.frequency, z * params.frequency, formula);
    let h;
    
    switch (params.subworld) {
        case 'mandelbrot_realm': h = base * params.amplitude * 0.3; break;
        case 'sierpinski_temple': h = base * params.amplitude * 2.0; break;
        case 'voronoi_city': h = base * params.amplitude * 0.8 + params.waterLevel; break;
        case 'crystal_cavern': h = base * params.amplitude + params.waterLevel; break;
        case 'ridged_mountains':
            h = ridgedmf(x * params.frequency, z * params.frequency, params.seed) * params.amplitude + params.waterLevel;
            break;
        case 'domain_warp_void':
            h = domainWarp(x * params.frequency, z * params.frequency, params.seed) * params.amplitude;
            break;
        case 'billow_ocean':
            h = billow(x * params.frequency, z * params.frequency, params.seed) * params.amplitude * 0.8;
            break;
        case 'hybrid_dream':
            h = hybrid(x * params.frequency, z * params.frequency, params.seed) * params.amplitude;
            break;
        default: h = base * params.amplitude + params.waterLevel;
    }
    
    h = Math.max(0, h);
    return h;
}

function getZone(x, z) {
    return params.subworld;
}

// THREE.JS RENDERING
function init() {
    console.log('Initializing 3D Engine...');
    
    const canvas = document.getElementById('game-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 20, 120);
    
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(pos.x, pos.y + 5, pos.z);
    
    renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87ceeb);
    
    // LIGHTING SYSTEM
    const ambient = new THREE.AmbientLight(0x6699cc, 0.5);
    scene.add(ambient);
    window.ambientLight = ambient;
    
    // Sun light with shadow
    const sun = new THREE.DirectionalLight(0xffffdd, 1.0);
    sun.position.set(50, 80, 30);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);
    window.sunLight = sun;
    
    // Hemisphere light for natural ambient
    const hemi = new THREE.HemisphereLight(0x87ceeb, 0x3d5c35, 0.4);
    scene.add(hemi);
    window.hemiLight = hemi;
    
    // AVATAR
    const avatar = new THREE.Mesh(
        new THREE.SphereGeometry(0.8, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.9 })
    );
    scene.add(avatar);
    window.avatar = avatar;
    
    const glow = new THREE.Mesh(
        new THREE.SphereGeometry(1.2, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.3 })
    );
    scene.add(glow);
    window.glow = glow;
    
    // MINIMAP SETUP
    const minimapCanvas = document.getElementById('minimap-canvas');
    minimapCanvas.width = 120;
    minimapCanvas.height = 120;
    window.minimapCtx = minimapCanvas.getContext('2d');
    
    // RESIZE HANDLER
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // CONTROLS
    document.addEventListener('keydown', e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key.toLowerCase() === 'r') regenerate();
        
        const subworldMap = {
            '1': 'fractal_forest', '2': 'simplex_plains', '3': 'voronoi_city', '4': 'ridged_mountains',
            '5': 'crystal_cavern', '6': 'mandelbrot_realm', '7': 'sierpinski_temple', '8': 'domain_warp_void',
            '9': 'billow_ocean', '0': 'hybrid_dream'
        };
        if (subworldMap[e.key]) { params.subworld = subworldMap[e.key]; updateSubWorld(); regenerate(); }
    });
    document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    
    // MOUSE LOOK
    document.getElementById('game-canvas').addEventListener('click', () => document.getElementById('game-canvas').requestPointerLock?.());
    document.addEventListener('pointerlockchange', () => {
        mouseEnabled = document.pointerLockElement !== null;
        document.getElementById('btn-mouse').classList.toggle('active', mouseEnabled);
    });
    document.addEventListener('mousemove', e => {
        if (mouseEnabled) {
            yaw -= e.movementX * 0.003;
            pitch = Math.max(-0.8, Math.min(0.8, pitch - e.movementY * 0.003));
        }
    });
    document.getElementById('btn-mouse').onclick = () => {
        if (mouseEnabled) document.exitPointerLock?.();
        else document.getElementById('game-canvas').requestPointerLock?.();
    };
    
    // BUTTONS
    const bind = (id, key) => {
        const btn = document.getElementById(id);
        if (btn) {
            btn.onmousedown = () => keys[key] = true;
            btn.onmouseup = () => keys[key] = false;
            btn.onmouseleave = () => keys[key] = false;
        }
    };
    bind('btn-w', 'w'); bind('btn-a', 'a'); bind('btn-s', 's'); bind('btn-d', 'd');
    bind('btn-up', ' '); bind('btn-down', 'shift');
    bind('btn-q', 'q'); bind('btn-e', 'e');
    document.getElementById('btn-regen').onclick = () => regenerate();
    
    // SUBWORLD BUTTONS
    document.querySelectorAll('.subworld-btn').forEach(btn => {
        btn.onclick = () => {
            params.subworld = btn.dataset.subworld;
            updateSubWorld();
            regenerate();
        };
    });
    
    // SLIDERS
    document.getElementById('seed-slider').oninput = () => {
        params.seed = parseInt(document.getElementById('seed-slider').value);
        document.getElementById('seed-val').textContent = params.seed;
        regenerate();
    };
    document.getElementById('amp-slider').oninput = () => {
        params.amplitude = parseInt(document.getElementById('amp-slider').value);
        document.getElementById('amp-val').textContent = params.amplitude;
        regenerate();
    };
    document.getElementById('water-slider').oninput = () => {
        params.waterLevel = parseInt(document.getElementById('water-slider').value);
        document.getElementById('water-val').textContent = params.waterLevel;
        updateFormula();
        regenerate();
    };
    document.getElementById('freq-slider').oninput = () => {
        params.frequency = parseInt(document.getElementById('freq-slider').value) / 1000;
        document.getElementById('freq-val').textContent = document.getElementById('freq-slider').value;
        updateFormula();
        regenerate();
    };
    document.getElementById('octaves-slider').oninput = () => {
        params.octaves = parseInt(document.getElementById('octaves-slider').value);
        document.getElementById('octaves-val').textContent = params.octaves;
        updateFormula();
        regenerate();
    };
    
    console.log('Generating terrain...');
    loadBlockTextures();
    updateFormula();
    regenerate();
    animate();
}

function updateSubWorld() {
    document.querySelectorAll('.subworld-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-subworld="${params.subworld}"]`)?.classList.add('active');
    params.formula = subworldFormulas[params.subworld] || 'fbm';
    updateFormula();
}

function updateFormula() {
    const formulas = {
        fbm: 'FBM',
        simplex: 'Simplex',
        voronoi: 'Voronoi',
        ridgedmf: 'RidgedMF',
        mandelbrot: 'Mandelbrot',
        sierpinski: 'Sierpinski',
        domainwarp: 'DomainWarp',
        billow: 'Billow',
        hybrid: 'Hybrid'
    };
    const f = formulas[params.formula] || 'FBM';
    document.getElementById('formula').textContent = 
        `h = ${f}(x*${params.frequency.toFixed(3)}, z*${params.frequency.toFixed(3)}) * ${params.amplitude} + ${params.waterLevel}`;
}

function regenerate() {
    console.log('Regenerating chunks...');
    meshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
    meshes.clear();
    
    const cx = Math.floor(pos.x / CHUNK);
    const cz = Math.floor(pos.z / CHUNK);
    const d = params.renderDistance;
    
    for (let x = cx - d; x <= cx + d; x++) {
        for (let z = cz - d; z <= cz + d; z++) {
            createChunk(x, z);
        }
    }
    
    console.log(`Generated ${meshes.size} chunks`);
}

function createChunk(cx, cz) {
    const key = cx + ',' + cz;
    if (meshes.has(key)) return;
    
    const res = 16;
    const geo = new THREE.PlaneGeometry(CHUNK, CHUNK, res, res);
    const posArr = geo.attributes.position.array;
    const cols = new Float32Array(posArr.length);
    
    const ox = cx * CHUNK;
    const oz = cz * CHUNK;
    
    for (let i = 0; i < posArr.length; i += 3) {
        const wx = ox + posArr[i];
        const wz = oz + posArr[i + 1];
        const h = getHeight(wx, wz);
        posArr[i + 2] = h;
        
        const subworld = getZone(wx, wz);
        const c = subworldColors[subworld] || 0x2d5a27;
        cols[i] = ((c >> 16) & 255) / 255;
        cols[i + 1] = ((c >> 8) & 255) / 255;
        cols[i + 2] = (c & 255) / 255;
    }
    
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    geo.computeVertexNormals();
    
    const mat = new THREE.MeshStandardMaterial({ 
        vertexColors: true, 
        side: THREE.DoubleSide,
        roughness: 0.85,
        metalness: 0.05,
        flatShading: false
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(ox + CHUNK / 2, 0, oz + CHUNK / 2);
    
    scene.add(mesh);
    meshes.set(key, mesh);
}

function updateMinimap() {
    const ctx = window.minimapCtx;
    if (!ctx) return;
    
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(0, 0, 120, 120);
    
    const scale = 2;
    const range = 30;
    const offsetX = 60 - pos.x * scale;
    const offsetZ = 60 - pos.z * scale;
    
    meshes.forEach(mesh => {
        const pos = mesh.position;
        const mx = pos.x * scale + offsetX;
        const mz = pos.z * scale + offsetZ;
        if (mx > -20 && mx < 140 && mz > -20 && mz < 140) {
            ctx.fillStyle = subworldColors[params.subworld] || '#2d5a27';
            ctx.fillRect(mx - 8, mz - 8, 16, 16);
        }
    });
    
    const marker = document.getElementById('minimap-marker');
    if (marker) {
        marker.style.left = '60px';
        marker.style.top = '60px';
    }
}

function updateUI() {
    const zone = getZone(pos.x, pos.z);
    const h = getHeight(pos.x, pos.z);
    
    document.getElementById('biome').textContent = zone;
    document.getElementById('height').textContent = h.toFixed(0) + 'm';
    document.getElementById('position').textContent = pos.x.toFixed(0) + ', ' + pos.y.toFixed(0) + ', ' + pos.z.toFixed(0);
    document.getElementById('chunk').textContent = (pos.x / CHUNK).toFixed(0) + ', ' + (pos.z / CHUNK).toFixed(0);
    
    if (window.avatar) {
        window.avatar.position.set(pos.x, pos.y, pos.z);
        window.glow.position.set(pos.x, pos.y, pos.z);
    }
}

function animate(time) {
    const delta = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;
    
    frameCount++;
    if (time - fpsTime > 1000) {
        document.getElementById('fps').textContent = frameCount;
        frameCount = 0;
        fpsTime = time;
    }
    
    const speed = 20 * delta;
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    
    if (keys['w']) { pos.x -= sy * speed; pos.z -= cy * speed; }
    if (keys['s']) { pos.x += sy * speed; pos.z += cy * speed; }
    if (keys['a']) { pos.x -= cy * speed; pos.z += sy * speed; }
    if (keys['d']) { pos.x += cy * speed; pos.z -= sy * speed; }
    if (keys[' ']) pos.y += speed;
    if (keys['shift']) pos.y = Math.max(1, pos.y - speed);
    if (keys['q']) yaw += speed;
    if (keys['e']) yaw -= speed;
    
    const groundY = getHeight(pos.x, pos.z);
    pos.y = Math.max(groundY + 3, pos.y);
    
    camera.position.set(pos.x, pos.y, pos.z);
    camera.rotation.set(pitch, yaw, 0, 'YXZ');
    
    // LOAD NEARBY CHUNKS
    const cx = Math.floor(pos.x / CHUNK);
    const cz = Math.floor(pos.z / CHUNK);
    const d = params.renderDistance;
    for (let x = cx - d; x <= cx + d; x++) {
        for (let z = cz - d; z <= cz + d; z++) {
            createChunk(x, z);
        }
    }
    
    updateUI();
    updateMinimap();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// START
document.addEventListener('DOMContentLoaded', init);
</script>
