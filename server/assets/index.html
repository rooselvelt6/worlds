<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WORLDS — Generador de Terreno Procesal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" />
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://unpkg.com/three@0.160.0/examples/js/shaders/CopyShader.js"></script>
    <script src="three_bridge.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; font-family: 'Inter', system-ui, sans-serif; }
        canvas:focus { outline: none; }
        input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; }
        input[type="range"]::-moz-range-thumb { border: none; }
        .slider-glow::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #22d3ee;
            box-shadow: 0 0 12px rgba(34,211,238,0.4), 0 0 30px rgba(34,211,238,0.15);
            transition: box-shadow 0.2s, transform 0.15s;
            border: none;
        }
        .slider-glow::-moz-range-thumb {
            width: 16px; height: 16px;
            border-radius: 50%;
            background: #22d3ee;
            box-shadow: 0 0 12px rgba(34,211,238,0.4), 0 0 30px rgba(34,211,238,0.15);
            transition: box-shadow 0.2s, transform 0.15s;
            border: none;
        }
        .slider-glow:hover::-webkit-slider-thumb {
            box-shadow: 0 0 20px rgba(34,211,238,0.6), 0 0 50px rgba(34,211,238,0.25);
            transform: scale(1.2);
        }
        .slider-glow:hover::-moz-range-thumb {
            box-shadow: 0 0 20px rgba(34,211,238,0.6), 0 0 50px rgba(34,211,238,0.25);
            transform: scale(1.2);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .menu-overlay {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-[#0a0a12]">
    <script type="module">
        import init from './worlds_app.js';
        init().catch(console.error);
    </script>
</body>
</html>
