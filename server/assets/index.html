<script type="module">
const $s = (id) => document.getElementById(id);
const status = (msg) => { const el = $s('loading-status'); if (el) el.textContent = msg; };
const error = (msg, hint) => {
    const el = $s('loading-error');
    const hl = $s('loading-hint');
    if (el) { el.textContent = msg; el.style.display = 'block'; }
    if (hl && hint) { hl.textContent = hint; hl.style.display = 'block'; }
    console.error('LOADING ERROR:', msg);
};
const done = () => {
    const el = $s('loading-screen');
    if (el) {
        $s('loading-status').textContent = '✅ Listo';
        el.style.pointerEvents = 'none';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
    }
};

try {
    status('Compilando WebAssembly...');
    const bindings = await import('/worlds-app-f14ad4fae1148653.js');
    const wasm = await bindings.default({ module_or_path: '/worlds-app-f14ad4fae1148653_bg.wasm' });

    window.wasmBindings = bindings;
    status('Inicializando motor gr\u00e1fico...');

    addEventListener('worldsInitComplete', () => done(), { once: true });
    setTimeout(() => { if ($s('loading-screen')) done(); }, 10000);

    dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));
} catch (e) {
    const msg = e.message || e.toString() || 'Error desconocido';
    const hint = 'Abre la consola (F12) para m\u00e1s detalles o revisa la conexi\u00f3n al servidor.';
    status('\u274c Error');
    error(msg, hint);
}
