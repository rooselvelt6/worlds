// FORMULA FUNCTIONS
function hash2d(x, z, seed) {
    let n = Math.sin(x * 127.42 + z * 313.37 + seed) * 43758.5453;
    return { x: (n - Math.floor(n)), y: (n * 1.3 - Math.floor(n * 1.3)) };
}

function noise(x, z, seed) {
    let n = Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453;
    return (n - Math.floor(n)) * 2 - 1;
}

function fbm(x, z, oct, seed) {
    let v = 0, a = 1, f = 1, m = 0;
    for (let i = 0; i < oct; i++) {
        v += noise(x * f, z * f, seed + i * 100) * a;
        m += a; a *= 0.5; f *= 2;
    }
    return m > 0 ? v / m : 0;
}

function simplex(x, z, seed) {
    const n1 = fbm(x * 2, z * 2, 3, seed);
    const n2 = fbm(x + 50, z + 50, 2, seed + 1);
    return (n1 + n2) / 2;
}

function voronoi(x, z) {
    let ix = Math.floor(x);
    let iz = Math.floor(z);
    let minDist = Infinity;
    let secondDist = Infinity;
    for (let dx = -2; dx <= 2; dx++) {
        for (let dz = -2; dz <= 2; dz++) {
            let cx = ix + dx;
            let cz = iz + dz;
            let h = hash2d(cx, cz, params.seed);
            let cellX = cx + h.x;
            let cellZ = cz + h.y;
            let dist = Math.sqrt((x - cellX) ** 2 + (z - cellZ) ** 2);
            if (dist < minDist) {
                secondDist = minDist;
                minDist = dist;
            } else if (dist < secondDist) {
                secondDist = dist;
            }
        }
    }
    return Math.abs(secondDist - minDist) * 1.5;
}

function mandelbrot(cx, cy) {
    let x0 = cx * 1.5 - 1.0;
    let y0 = cy * 1.5 - 0.5;
    let x = 0, y = 0, iter = 0;
    let maxIter = 12;
    while (x * x + y * y <= 16 && iter < maxIter) {
        let xtemp = x * x - y * y + x0;
        y = 2 * x * y + y0;
        x = xtemp;
        iter++;
    }
    return iter / maxIter;
}

function sierpinski(x, z) {
    let px = Math.abs(x * 0.5) | 0;
    let pz = Math.abs(z * 0.5) | 0;
    let count = 0;
    let depth = 0;
    while ((px | pz) !== 0 && depth < 8) {
        if ((px & 1) === 1 && (pz & 1) === 1) count++;
        px >>= 1;
        pz >>= 1;
        depth++;
    }
    return Math.pow(0.5, count);
}

function billow(x, z, seed) {
    return Math.abs(fbm(x * 1.5, z * 1.5, 6, seed));
}

function ridgedmf(x, z, seed) {
    let v = 0, a = 1, f = 1, prev = 1, m = 0;
    for (let i = 0; i < 6; i++) {
        let n = 1 - Math.abs(noise(x * f, z * f, seed + i * 100));
        let ridge = n * n;
        v += ridge * a * prev;
        prev = ridge;
        m += a;
        a *= 0.45;
        f *= 2.1;
    }
    return v / (m || 1);
}

function domainWarp(x, z, seed) {
    let warpX = fbm(x + seed, z + seed * 0.5, 3, seed) * 4;
    let warpZ = fbm(x + seed * 0.7, z + seed * 1.3, 3, seed + 50) * 4;
    let finalX = x + warpX;
    let finalZ = z + warpZ;
    return fbm(finalX, finalZ, 5, seed) - fbm(finalX * 0.7, finalZ * 0.7, 3, seed + 100) * 0.3;
}

function hybrid(x, z, seed) {
    let f = fbm(x, z, 4, seed);
    let r = ridgedmf(x * 1.5, z * 1.5, seed);
    let v = voronoi(x * 0.5, z * 0.5);
    let b = billow(x * 0.7, z * 0.7, seed + 20);
    return (f * 0.4 + r * 0.3 + v * 0.15 + b * 0.15);
}

function calculate(x, z, formula) {
    switch (formula) {
        case 'fbm': return fbm(x, z, params.octaves, params.seed);
        case 'simplex': return simplex(x, z, params.seed);
        case 'voronoi': return voronoi(x, z);
        case 'ridgedmf': return ridgedmf(x, z, params.seed);
        case 'mandelbrot': return mandelbrot(x * 0.3, z * 0.3);
        case 'sierpinski': return sierpinski(x, z);
        case 'domainwarp': return domainWarp(x, z, params.seed);
        case 'billow': return billow(x, z, params.seed);
        case 'hybrid': return hybrid(x, z, params.seed);
        default: return fbm(x, z, params.octaves, params.seed);
    }
}

function getHeight(x, z) {
    const formula = params.formula || subworldFormulas[params.subworld] || 'fbm';
    const base = calculate(x * params.frequency, z * params.frequency, formula);
    let h;
    
    const amplitudeMod = {
        mandelbrot: 0.3,
        sierpinski: 2.0,
        voronoi: 0.8,
        simplex: 1.0,
        ridgedmf: 1.2,
        domainwarp: 1.0,
        billow: 0.8,
        hybrid: 1.0,
        fbm: 1.0
    };
    const mod = amplitudeMod[formula] || 1.0;
    
    switch (formula) {
        case 'mandelbrot': h = base * params.amplitude * mod; break;
        case 'sierpinski': h = base * params.amplitude * mod; break;
        case 'voronoi': h = base * params.amplitude * mod + params.waterLevel; break;
        case 'simplex': h = base * params.amplitude * mod + params.waterLevel * 0.5; break;
        case 'ridgedmf': h = base * params.amplitude * mod + params.waterLevel; break;
        case 'domainwarp': h = base * params.amplitude * mod; break;
        case 'billow': h = base * params.amplitude * mod; break;
        case 'hybrid': h = base * params.amplitude * mod; break;
        default: h = base * params.amplitude * mod + params.waterLevel;
    }
    
    h = Math.max(0, h);
    return h;
}

function getZone(x, z) {
    return params.subworld;
}

function getColorFromFormula(formula, height, x, z) {
    const palette = formulaPalettes[formula] || formulaPalettes.fbm;
    const maxH = params.amplitude * 1.5;
    let normalizedH = Math.min(height / maxH, 1);
    
    for (let i = palette.thresholds.length; i >= 0; i--) {
        if (normalizedH >= (palette.thresholds[i - 1] || 0)) {
            const c = palette.colors[Math.min(i, palette.colors.length - 1)];
            return c;
        }
    }
    return palette.colors[0];
}

function lerpColor(c1, c2, t) {
    const r1 = (c1 >> 16) & 255, g1 = (c1 >> 8) & 255, b1 = c1 & 255;
    const r2 = (c2 >> 16) & 255, g2 = (c2 >> 8) & 255, b2 = c2 & 255;
    const r = Math.round(r1 + (r2 - r1) * t);
    const g = Math.round(g1 + (g2 - g1) * t);
    const b = Math.round(b1 + (b2 - b1) * t);
    return (r << 16) | (g << 8) | b;
}

function getColorSmooth(formula, height, x, z) {
    const palette = formulaPalettes[formula] || formulaPalettes.fbm;
    const maxH = params.amplitude * 1.5;
    let normalizedH = Math.min(Math.max(height / maxH, 0), 1);
    
    for (let i = 0; i < palette.thresholds.length; i++) {
        if (normalizedH <= palette.thresholds[i]) {
            const prev = i === 0 ? 0 : palette.thresholds[i - 1];
            const t = (normalizedH - prev) / (palette.thresholds[i] - prev);
            return lerpColor(palette.colors[i], palette.colors[i + 1] || palette.colors[i], t);
        }
    }
    return palette.colors[palette.colors.length - 1];
}

function drawFormula2D() {
    if (!formulaCanvasCtx) return;
    const ctx = formulaCanvasCtx;
    const w = ctx.canvas.width || 128;
    const h = ctx.canvas.height || 128;
    const imgData = ctx.createImageData(w, h);
    const scale = 0.05;
    const offset = params.seed * 0.1;
    
    for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
            const x = (px - w / 2) * scale + offset;
            const z = (py - h / 2) * scale + offset;
            const val = calculate(x, z, params.formula);
            const color = getColorSmooth(params.formula, val * params.amplitude, x, z);
            const idx = (py * w + px) * 4;
            imgData.data[idx] = (color >> 16) & 255;
            imgData.data[idx + 1] = (color >> 8) & 255;
            imgData.data[idx + 2] = color & 255;
            imgData.data[idx + 3] = 255;
        }
    }
    ctx.putImageData(imgData, 0, 0);
    document.getElementById('formula-label').textContent = formulaPalettes[params.formula]?.name || 'FBM';
}

function updateSubWorld() {
    document.querySelectorAll('.subworld-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-subworld="${params.subworld}"]`)?.classList.add('active');
    params.formula = subworldFormulas[params.subworld] || 'fbm';
    currentPalette = params.formula;
    updateFormula();
    updateSky();
    updateFormulaGrid();
    markAllDirty();
}

function markAllDirty() {
    chunkPool.forEach((chunk, key) => chunk.dirty = true);
}

function updateSky() {
    const colors = skyColors[params.subworld] || skyColors.fractal_forest;
    if (scene) {
        scene.background = new THREE.Color(colors.sky);
        scene.fog.color = new THREE.Color(colors.fog);
    }
    if (window.ambientLight) {
        window.ambientLight.color = new THREE.Color(colors.ambient);
    }
}

function updateFormula() {
    const formulas = {
        fbm: 'FBM',
        simplex: 'Simplex',
        voronoi: 'Voronoi',
        ridgedmf: 'RidgedMF',
        mandelbrot: 'Mandelbrot',
        sierpinski: 'Sierpinski',
        domainwarp: 'DomainWarp',
        billow: 'Billow',
        hybrid: 'Hybrid'
    };
    const f = formulas[params.formula] || 'FBM';
    document.getElementById('formula').textContent = 
        `h = ${f}(x*${params.frequency.toFixed(3)}, z*${params.frequency.toFixed(3)}) * ${params.amplitude} + ${params.waterLevel}`;
}

function regenerate() {
    console.log('Regenerating chunks...');
    chunkPool.forEach((chunk, key) => {
        scene.remove(chunk.mesh);
        chunk.mesh.geometry.dispose();
        chunk.mesh.material.dispose();
    });
    chunkPool.clear();
    meshes.clear();
    updateSky();
    
    const cx = Math.floor(pos.x / CHUNK);
    const cz = Math.floor(pos.z / CHUNK);
    const d = params.renderDistance;
    
    for (let x = cx - d; x <= cx + d; x++) {
        for (let z = cz - d; z <= cz + d; z++) {
            createChunk(x, z);
        }
    }
    
    console.log(`Generated ${chunkPool.size} chunks`);
}

function loadBlockTextures() {}

function createChunk(cx, cz) {
    const key = cx + ',' + cz;
    if (chunkPool.has(key)) {
        const cached = chunkPool.get(key);
        if (cached.mesh.parent !== scene) scene.add(cached.mesh);
        cached.lastAccess = Date.now();
        if (cached.dirty) updateChunkColors(cached);
        return;
    }
    
    if (chunkPool.size >= MAX_CHUNKS) {
        let oldestKey = null;
        let oldestTime = Infinity;
        chunkPool.forEach((chunk, k) => {
            if (chunk.lastAccess < oldestTime) {
                oldestTime = chunk.lastAccess;
                oldestKey = k;
            }
        });
        if (oldestKey) {
            const old = chunkPool.get(oldestKey);
            scene.remove(old.mesh);
            old.mesh.geometry.dispose();
            old.mesh.material.dispose();
            chunkPool.delete(oldestKey);
        }
    }
    
    const res = CHUNK_RES;
    const geo = new THREE.PlaneGeometry(CHUNK, CHUNK, res, res);
    const posArr = geo.attributes.position.array;
    const cols = new Float32Array(posArr.length);
    const heights = new Float32Array(posArr.length / 3);
    
    const ox = cx * CHUNK;
    const oz = cz * CHUNK;
    
    for (let i = 0; i < posArr.length; i += 3) {
        const wx = ox + posArr[i];
        const wz = oz + posArr[i + 1];
        const h = getHeight(wx, wz);
        const idx = i / 3;
        posArr[i + 2] = h;
        heights[idx] = h;
        
        const formula = subworldFormulas[params.subworld] || 'fbm';
        const c = getColorSmooth(formula, h, wx, wz);
        cols[i] = ((c >> 16) & 255) / 255;
        cols[i + 1] = ((c >> 8) & 255) / 255;
        cols[i + 2] = (c & 255) / 255;
    }
    
    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
    geo.computeVertexNormals();
    
    const mat = new THREE.MeshStandardMaterial({ 
        vertexColors: true, 
        side: THREE.DoubleSide,
        roughness: 0.85,
        metalness: 0.05,
        flatShading: false
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(ox + CHUNK / 2, 0, oz + CHUNK / 2);
    
    scene.add(mesh);
    chunkPool.set(key, { mesh, cx, cz, heights, dirty: false, lastAccess: Date.now() });
    meshes.set(key, mesh);
}

function updateChunkColors(chunkData) {
    const { mesh, cx, cz, heights } = chunkData;
    const geo = mesh.geometry;
    const posArr = geo.attributes.position.array;
    const cols = geo.attributes.color.array;
    const ox = cx * CHUNK;
    const oz = cz * CHUNK;
    const formula = subworldFormulas[params.subworld] || 'fbm';
    
    for (let i = 0; i < posArr.length; i += 3) {
        const wx = ox + posArr[i];
        const wz = oz + posArr[i + 1];
        const h = getHeight(wx, wz);
        const idx = i / 3;
        posArr[i + 2] = h;
        heights[idx] = h;
        
        const c = getColorSmooth(formula, h, wx, wz);
        cols[i] = ((c >> 16) & 255) / 255;
        cols[i + 1] = ((c >> 8) & 255) / 255;
        cols[i + 2] = (c & 255) / 255;
    }
    
    geo.attributes.position.needsUpdate = true;
    geo.attributes.color.needsUpdate = true;
    geo.computeVertexNormals();
    chunkData.dirty = false;
}

function refreshAllChunks() {
    chunkPool.forEach((chunk, key) => {
        updateChunkColors(chunk);
    });
}

function updateMinimap() {
    const ctx = window.minimapCtx;
    if (!ctx) return;
    const size = window.minimapSize || 128;
    const half = size / 2;
    
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(0, 0, size, size);
    
    const scale = 1.5;
    const offsetX = half - pos.x * scale;
    const offsetZ = half - pos.z * scale;
    const formula = subworldFormulas[params.subworld] || 'fbm';
    
    chunkPool.forEach((chunk) => {
        const p = chunk.mesh.position;
        const mx = p.x * scale + offsetX;
        const mz = p.z * scale + offsetZ;
        if (mx > -CHUNK * scale && mx < size + CHUNK * scale && mz > -CHUNK * scale && mz < size + CHUNK * scale) {
            ctx.fillStyle = '#' + formulaPalettes[formula].colors[3].toString(16).padStart(6, '0');
            ctx.fillRect(mx - 4, mz - 4, 8, 8);
            
            const centerH = chunk.heights[Math.floor(chunk.heights.length / 2)] || 10;
            const color = getColorFromFormula(formula, centerH, p.x, p.z);
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(mx - 3, mz - 3, 6, 6);
        }
    });
    
    const marker = document.getElementById('minimap-marker');
    if (marker) {
        marker.style.left = half + 'px';
        marker.style.top = half + 'px';
    }
    
    const info = document.getElementById('minimap-info');
    if (info) info.textContent = `${chunkPool.size} chunks`;
}

function updateDayNightCycle() {
    if (!dayCycleEnabled || !scene) return;
    
    dayTime = (dayTime + daySpeed) % 1;
    const sunAngle = dayTime * Math.PI * 2;
    const sinSun = Math.sin(sunAngle);
    const cosSun = Math.cos(sunAngle);
    
    const sunY = sinSun * 80;
    const sunX = cosSun * 50;
    const sunZ = cosSun * 30;
    
    if (window.sunLight) {
        window.sunLight.position.set(sunX, Math.max(sunY, 5), sunZ);
        window.sunLight.intensity = Math.max(0.1, sinSun * 1.2);
    }
    
    if (window.ambientLight) {
        const nightIntensity = Math.max(0.2, 0.3 + sinSun * 0.4);
        window.ambientLight.intensity = nightIntensity;
    }
    
    const sky = scene.background;
    const fog = scene.fog.color;
    
    if (sinSun < 0) {
        sky.setHex(0x0a0a1a);
        fog.setHex(0x1a1a2a);
    } else if (sinSun < 0.3) {
        sky.setHex(0x4a5568);
        fog.setHex(0x6b7280);
    } else {
        const colors = skyColors[params.subworld] || skyColors.fractal_forest;
        sky.setHex(colors.sky);
        fog.setHex(colors.fog);
    }
    
    const timeStr = (dayTime < 0.25 ? 'Noche' : dayTime < 0.5 ? 'Mañana' : dayTime < 0.75 ? 'Día' : 'Tarde');
    document.getElementById('biome').textContent = params.subworld.replace('_', ' ');
}

function updateUI() {
    const zone = getZone(pos.x, pos.z);
    const h = getHeight(pos.x, pos.z);
    
    document.getElementById('biome').textContent = zone;
    document.getElementById('height').textContent = h.toFixed(0) + 'm';
    document.getElementById('pos-header').textContent = pos.x.toFixed(0) + ', ' + pos.y.toFixed(0) + ', ' + pos.z.toFixed(0);
    document.getElementById('chunk').textContent = (pos.x / CHUNK).toFixed(0) + ', ' + (pos.z / CHUNK).toFixed(0);
    
    if (window.avatar) {
        window.avatar.position.set(pos.x, pos.y, pos.z);
        window.glow.position.set(pos.x, pos.y, pos.z);
    }
}

function animate(time) {
    const delta = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;
    
    frameCount++;
    if (time - fpsTime > 1000) {
        document.getElementById('fps').textContent = frameCount;
        frameCount = 0;
        fpsTime = time;
    }
    
    const speed = 20 * delta;
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    
    if (keys['w']) { pos.x -= sy * speed; pos.z -= cy * speed; }
    if (keys['s']) { pos.x += sy * speed; pos.z += cy * speed; }
    if (keys['a']) { pos.x -= cy * speed; pos.z += sy * speed; }
    if (keys['d']) { pos.x += cy * speed; pos.z -= sy * speed; }
    if (keys[' ']) pos.y += speed;
    if (keys['shift']) pos.y = Math.max(1, pos.y - speed);
    if (keys['q']) yaw += speed;
    if (keys['e']) yaw -= speed;
    
    const groundY = getHeight(pos.x, pos.z);
    pos.y = Math.max(groundY + 3, pos.y);
    
    // CAMERA MODE (first/third person)
    if (cameraMode === 'third') {
        const dist = 10;
        const camX = pos.x - Math.sin(yaw) * dist;
        const camZ = pos.z - Math.cos(yaw) * dist;
        const camY = pos.y + 4;
        camera.position.set(camX, camY, camZ);
        camera.lookAt(pos.x, pos.y, pos.z);
    } else {
        camera.position.set(pos.x, pos.y, pos.z);
        camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
    
    // LOAD NEARBY CHUNKS (streaming reactivo)
    const cx = Math.floor(pos.x / CHUNK);
    const cz = Math.floor(pos.z / CHUNK);
    const d = params.renderDistance;
    for (let x = cx - d; x <= cx + d; x++) {
        for (let z = cz - d; z <= cz + d; z++) {
            createChunk(x, z);
        }
    }
    
    // Recargar chunks lejanos que estén en pool
    chunkPool.forEach((chunk, key) => {
        const dx = Math.abs(chunk.cx - cx);
        const dz = Math.abs(chunk.cz - cz);
        if (dx > d + 2 || dz > d + 2) {
            if (chunk.mesh.parent === scene) {
                scene.remove(chunk.mesh);
            }
        }
    });
    
    updateUI();
    updateMinimap();
    updateDayNightCycle();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// START
setTimeout(() => {
    if (document.readyState === 'complete') {
        init();
    } else {
        window.addEventListener('load', init);
    }
}, 100);
</script>
