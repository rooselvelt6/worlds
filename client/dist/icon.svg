<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <g transform="translate(256,256)" fill="none" stroke="url(#g)" stroke-width="12">
    <!-- planet rings -->
    <ellipse rx="180" ry="60" transform="rotate(-20)" stroke-width="8" opacity="0.5"/>
    <ellipse rx="130" ry="40" transform="rotate(-20)" stroke-width="10"/>
    <!-- planet body -->
    <circle r="80" stroke-width="12" opacity="0.8"/>
    <circle r="80" stroke-width="3" fill="url(#g)" opacity="0.15"/>
    <!-- terrain detail -->
    <path d="M-65,-30 Q-30,-50 0,-35 Q30,-20 65,-40" stroke-width="4" opacity="0.6"/>
    <path d="M-55,10 Q-20,-5 10,0 Q40,5 55,-10" stroke-width="3" opacity="0.4"/>
    <!-- star dots -->
    <circle cx="-140" cy="-100" r="4" fill="url(#g)" opacity="0.7"/>
    <circle cx="150" cy="-80" r="3" fill="url(#g)" opacity="0.5"/>
    <circle cx="-170" cy="40" r="3" fill="url(#g)" opacity="0.4"/>
    <circle cx="100" cy="120" r="3.5" fill="url(#g)" opacity="0.6"/>
    <circle cx="-80" cy="130" r="2.5" fill="url(#g)" opacity="0.3"/>
  </g>
</svg>
