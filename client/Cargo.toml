[package]
name = "worlds-client"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
web-sys = { version = "0.3", features = [
    "Window", "Document", "HtmlCanvasElement", "CanvasRenderingContext2d",
    "HtmlElement", "HtmlDivElement", "Event", "KeyboardEvent", "MouseEvent",
    "console", "Performance", "Navigator", "Location",
] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
worlds-shared = { path = "../shared" }
leptos = { version = "0.7", features = ["hydrate"] }
three-d = "0.9"
console_error_panic_hook = "0.1"

[profile.release]
lto = true
codegen-units = 1